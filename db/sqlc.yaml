# ref: https://docs.sqlc.dev/en/latest/reference/config.html
version: "2"
plugins:
  - name: ts
    wasm:
      url: https://downloads.sqlc.dev/plugin/sqlc-gen-typescript_0.1.3.wasm
      sha256: 287df8f6cc06377d67ad5ba02c9e0f00c585509881434d15ea8bd9fc751a9368
sql:
  - engine: postgresql
    queries: query.sql
    schema: migrations/
    database:
      uri: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}"
    gen:
      go:
        package: db
        out: ../pkg/go-shared/db
        sql_package: pgx/v5
        output_models_file_name: models.gen.go
        output_db_file_name: db.gen.go
        output_files_suffix: .gen
        overrides:
          - column: public.principals.id
            go_type:
              import: github.com/google/uuid
              type: UUID
          - column: public.principals.service_id
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
          - column: public.principals.user_id
            go_type:
              type: string
              pointer: true
          - column: public.api_keys.principal_id
            go_type:
              import: github.com/google/uuid
              type: UUID
    codegen:
      - out: ../apps/web/src/lib/db
        plugin: ts
        options:
          runtime: node
          driver: pg
