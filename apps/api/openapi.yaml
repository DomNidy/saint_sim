# https://swagger.io/specification/
openapi: 3.0.3
info:
  title: Saint API
  version: 1.0.0
  description: |-
    This API responsible for the saint business logic. The discord bot, and, potentially more services in the future, will call this API.

paths:
  /health:
    get:
      operationId: health
      description: Returns API health status.
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_response"
  /simulation/{id}:
    get:
      operationId: getSimulation
      description: View the result of a simulation.
      parameters:
        - name: id
          in: path
          description: The ID of the simulation to query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The simulation result, or, if the simulation is currently in
            progress, the current state of the simulation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simulation"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simulation:
    post:
      operationId: simulate
      description: Request a simulation, powered by SimC.
      requestBody:
        required: true
        description: "Specify simulation options here."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/simulation_options"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "202":
          description: Simulation request was accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                    description: ID of the simulation that was created
        "400":
          description: Returned when the request is malformed or contains invalid
            simulation options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "401":
          description: Returned when the request does not include valid authentication
            credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "404":
          $ref: "#/components/responses/not_found_error"
        "422":
          $ref: "#/components/responses/malformed_request"
        "500":
          $ref: "#/components/responses/internal_error"
components:
  responses:
    bad_request_error:
      description: Returned when the request is malformed or contains invalid input.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    not_found_error:
      description: Returned when the api could not locate a requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    internal_error:
      description: Returned whenever an internal server error occurs. This usually
        means the cause for the error was out of the control of the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    malformed_request:
      description: Error response returned by API when user input failed semantic validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"

  securitySchemes:
    BearerAuth:
      description: |
        Better Auth JWT used by first-party callers.
        Use the `Authorization: Bearer <jwt>` header to authenticate.
        Tokens should be issued by `BETTER_AUTH_URL` and intended for `SAINT_API_URL`.
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      description: |
        Schema used by trusted clients that authenticate with our API.
        Use the `Api-Key: <api_key>` header to authenticate.
      type: apiKey
      in: header
      name: Api-Key
  schemas:
    health_response:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: healthy

    character_class:
      type: string
      enum:
        - warrior
        - hunter
        - monk
        - paladin
        - rogue
        - shaman
        - mage
        - warlock
        - druid
        - deathknight
        - priest
        - demonhunter
        - evoker

    simulation_core_config:
      type: object
      description: Core simc config that is shared between all simulation kinds
        (basic, top gear, etc.)
      properties:
        fight_style:
          $ref: "#/components/schemas/fight_style"

    fight_style:
      type: string
      description: Simc fight style
      enum:
        - patchwerk
        - dungeon_slice
        - target_dummy
        - execute_patchwerk
        - hectic_add_cleave
        - light_movement
        - heavy_movement
        - casting_patchwerk
        - cleave_add

    simulation_options:
      type: object
      oneOf:
        - $ref: "#/components/schemas/simulation_config_basic"
        - $ref: "#/components/schemas/simulation_config_topGear"
      discriminator:
        description: The concrete simulation kind to perform
        propertyName: kind
        mapping:
          basic: "#/components/schemas/simulation_config_basic"
          topGear: "#/components/schemas/simulation_config_topGear"

    simulation_config_basic:
      type: object
      description: Specifies simulation options to send to the API.
      required:
        - kind
        - character
        - core_config
      properties:
        kind:
          # note: we don't use the simulation_kind enum here;
          # TS zod validators get a but scuffed. There's no
          # way to make the generated zod validator's enum
          # field narrow to a specific value of the enum.
          #
          # For example, if we used simulation_kind here, then the
          # generated zod validator would allow any value in the enum
          # (wouldn't narrow down to just `basic`)
          # $ref: "#/components/schemas/simulation_kind"
          type: string
          enum: [ basic ]
        character:
          description: The character we are optimizing/simulating on
          $ref: "#/components/schemas/wow_character"
        core_config:
          $ref: "#/components/schemas/simulation_core_config"

    simulation_config_topGear:
      type: object
      description: Top gear simulation options. The gear which we should try to find
        some optimal combination of.
      required:
        - core_config
        - equipment
        - kind
        - character
      properties:
        kind:
          # $ref: "#/components/schemas/simulation_kind"
          type: string
          enum: [ topGear ]
        character:
          description: The character we are optimizing/simulating on
          $ref: "#/components/schemas/wow_character"
        core_config:
          $ref: "#/components/schemas/simulation_core_config"
        equipment:
          description: The gear to consider in the simulation. We will try to find optimal
            combinations of these. Must have at least 1 item per slot so it is
            possible to form a full equipment set.
          type: array
          items:
            $ref: "#/components/schemas/equipment_item"

    equipment_source:
      type: string
      enum:
        - equipped
        - bag

    equipment_slot:
      type: string
      enum:
        - head
        - neck
        - shoulder
        - back
        - chest
        - wrist
        - hands
        - waist
        - legs
        - feet
        - finger1
        - finger2
        - trinket1
        - trinket2
        - main_hand
        - off_hand
        - shirt
        - tabard

    character_talent_loadout:
      type: object
      description: A saved talent loadout string, paired with the name of the loadout.
        You can export this from the Simc addon (or manually from talents menu
        in game).
      required:
        - talents
      properties:
        name:
          description: The name of the talent loadout.
          type: string
        talents:
          description: The WoW talent string
          type: string

    character_slot_high_watermark:
      type: object
      description: The character's current and highest unlocked upgrade track item
        levels for a specific gear slot from Additional Character Info.
      required:
        - slot
        - current_item_level
        - max_item_level
      properties:
        slot:
          description: The slot which this watermark is for
          $ref: "#/components/schemas/equipment_slot"
        current_item_level:
          type: integer
        max_item_level:
          type: integer

    equipment_item:
      type: object
      required:
        - slot
        - name
        - display_name
        - item_id
        - source
        - raw_line
      properties:
        slot:
          $ref: "#/components/schemas/equipment_slot"
        name:
          type: string
        display_name:
          type: string
        item_id:
          type: integer
        item_level:
          type: integer
          nullable: true
        enchant_id:
          type: integer
          nullable: true
        crafting_quality:
          type: integer
          nullable: true
        bonus_ids:
          type: array
          items:
            type: integer
        gem_ids:
          type: array
          items:
            type: integer
        crafted_stats:
          type: array
          items:
            type: integer
        source:
          $ref: "#/components/schemas/equipment_source"
        raw_line:
          type: string

    simulation:
      type: object
      description: Polling envelope for a simulation job.
      required:
        - id
        - kind
        - status
      properties:
        id:
          type: string
          format: uuid
          description: ID for the simulation operation.
          example: "41e9a22f-d2c1-48b2-b234-15db461049d4"
        kind:
          $ref: "#/components/schemas/simulation_kind"
        status:
          $ref: "#/components/schemas/simulation_status"
        error_text:
          type: string
          description: Populated when status = error.
        result:
          $ref: "#/components/schemas/simulation_result"
        raw_simc_input:
          type: string
          description: The raw SIMC input for the sim

    simulation_kind:
      description: The concrete kind of simulation to perform (basic, topGear, etc.)
      type: string
      enum:
        - basic
        - topGear

    simulation_result:
      description: >
        Typed output of a completed simulation. This is the value the worker
        writes to `simulation.sim_result` in the database and the API returns
        verbatim; the API does not recompute it on read.
      oneOf:
        - $ref: "#/components/schemas/simulation_result_basic"
        - $ref: "#/components/schemas/simulation_result_topGear"
      discriminator:
        propertyName: kind
        mapping:
          basic: "#/components/schemas/simulation_result_basic"
          topGear: "#/components/schemas/simulation_result_topGear"

    simulation_result_basic:
      type: object
      description: >
        Result of a `basic` simulation — a single actor simmed with their
        equipped gear. For now this just surfaces the headline DPS and the raw
        simc log; it will grow structured stats later.
      required:
        - kind
        - dps
      properties:
        kind:
          type: string
          enum: [ basic ]
        dps:
          type: number
          format: double
          description: Mean DPS of the simmed actor.
        raw_log:
          type: string
          description: >
            Human-readable stdout from simc. Optional; may be truncated or
            omitted for large runs.

    simulation_result_topGear:
      type: object
      description: >
        Result of a `topGear` simulation.

        To keep payload size bounded when many profilesets are generated, items
        are sent once in `equipment` and each profileset references them by
        index. A profileset's `head: 3` means "the item at equipment[3]".
        Indices are stable for the lifetime of this result object; they are NOT
        indices into the request's equipment array (the worker may have
        reordered/deduplicated).
      required:
        - kind
        - metric
        - equipment
        - profilesets
      properties:
        kind:
          type: string
          enum: [ topGear ]
        metric:
          type: string
          description: >
            The statistic `mean` on each profileset refers to. Copied from
            simc's `sim.profilesets.metric` — usually "dps".
          example: dps
        equipment:
          type: array
          description: >
            Item table for this result. Every integer slot value inside
            `profilesets[*].items` is an index into this array.
          items:
            $ref: "#/components/schemas/equipment_item"
        profilesets:
          type: array
          description: >
            All simmed loadouts, sorted by `mean` descending (best first).
          items:
            $ref: "#/components/schemas/topGear_profileset_result"

    topGear_profileset_result:
      type: object
      description: One simmed loadout and its headline metric.
      required:
        - name
        - mean
        - items
      properties:
        name:
          type: string
          description: >
            Profileset label as generated by the worker (e.g. "Combo7"). Matches
            `sim.profilesets.results[].name` in the raw simc json2 blob, which
            is how the worker joins metrics to loadouts.
        mean:
          type: number
          format: double
          description: Mean of `metric` (typically DPS) for this loadout.
        mean_error:
          type: number
          format: double
          description: simc's reported error bound on `mean`.
        items:
          $ref: "#/components/schemas/topGear_profileset_items"

    topGear_profileset_items:
      type: object
      description: >
        Per-slot equipment selection for a single loadout. Every value is an
        index into the parent result's `equipment` array. `off_hand` is omitted
        when the loadout uses a two-handed weapon.
      required:
        - head
        - neck
        - shoulder
        - back
        - chest
        - wrist
        - hands
        - waist
        - legs
        - feet
        - finger1
        - finger2
        - trinket1
        - trinket2
        - main_hand
      properties:
        head: { type: integer }
        neck: { type: integer }
        shoulder: { type: integer }
        back: { type: integer }
        chest: { type: integer }
        wrist: { type: integer }
        hands: { type: integer }
        waist: { type: integer }
        legs: { type: integer }
        feet: { type: integer }
        finger1: { type: integer }
        finger2: { type: integer }
        trinket1: { type: integer }
        trinket2: { type: integer }
        main_hand: { type: integer }
        off_hand:
          type: integer
          description: Absent when this loadout has no off-hand (two-hander).

    character_equipped_items:
      type: object
      description: >
        Items that the character currently has equipped, keyed by equipment
        slot. `off_hand` is omitted when the character uses a two-handed weapon.
      required:
        - head
        - neck
        - shoulder
        - back
        - chest
        - wrist
        - hands
        - waist
        - legs
        - feet
        - finger1
        - finger2
        - trinket1
        - trinket2
        - main_hand
      properties:
        head: { $ref: "#/components/schemas/equipment_item" }
        neck: { $ref: "#/components/schemas/equipment_item" }
        shoulder: { $ref: "#/components/schemas/equipment_item" }
        back: { $ref: "#/components/schemas/equipment_item" }
        chest: { $ref: "#/components/schemas/equipment_item" }
        wrist: { $ref: "#/components/schemas/equipment_item" }
        hands: { $ref: "#/components/schemas/equipment_item" }
        waist: { $ref: "#/components/schemas/equipment_item" }
        legs: { $ref: "#/components/schemas/equipment_item" }
        feet: { $ref: "#/components/schemas/equipment_item" }
        finger1: { $ref: "#/components/schemas/equipment_item" }
        finger2: { $ref: "#/components/schemas/equipment_item" }
        trinket1: { $ref: "#/components/schemas/equipment_item" }
        trinket2: { $ref: "#/components/schemas/equipment_item" }
        main_hand: { $ref: "#/components/schemas/equipment_item" }
        off_hand:
          description: Absent when the character has no off-hand equipped.
          $ref: "#/components/schemas/equipment_item"

    simulation_status:
      type: string
      enum:
        - in_progress # currently being performed
        - in_queue # waiting to be picked up and in queue
        - error # failed
        - complete

    wow_character:
      description: The representation of a wow character.
      type: object
      required:
        - level
        - character_class
        - equipped_items
        - spec
        - race
        - active_talents
      properties:
        name:
          type: string
          description: Name of the character
        character_class:
          $ref: "#/components/schemas/character_class"
        level:
          type: integer
          minimum: 1
        loot_spec:
          type: string
          description: The loot specialization of your character.
        race:
          type: string
        region:
          type: string
          nullable: true
        server:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        professions:
          type: string
          nullable: true
        spec:
          type: string
        equipped_items:
          description: Items that the character currently has equipped.
          $ref: "#/components/schemas/character_equipped_items"
        bag_items:
          type: array
          description: Items in the character's bags
          items:
            $ref: "#/components/schemas/equipment_item"
        active_talents:
          description: The character's current active talent loadout
          $ref: "#/components/schemas/character_talent_loadout"
        talent_loadouts:
          description: The talent loadouts that were not active
          type: array
          items:
            $ref: "#/components/schemas/character_talent_loadout"

        catalyst_currencies:
          description: Catalyst charges
          type: array
          items:
            type: object
            required:
              - id
              - quantity
            properties:
              id:
                type: integer
                description: The id of the currency
              quantity:
                type: integer
                description: The quantity of the currency the character has
        slot_high_watermarks:
          type: array
          items:
            $ref: "#/components/schemas/character_slot_high_watermark"
        upgrade_achievements:
          type: array
          items:
            type: integer

    error_response:
      description: Error response returned by API when something goes wrong
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          description: Message explaining the error
        code:
          type: string
          description: Error code
