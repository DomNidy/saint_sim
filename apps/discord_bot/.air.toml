root = "."
tmp_dir = "apps/discord_bot/tmp"

[build]
  cmd = "go build -o ./apps/discord_bot/tmp/main ./apps/discord_bot"
  bin = "./apps/discord_bot/tmp/main"
  include_dir = ["apps/discord_bot", "pkg"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  kill_delay = "500ms"
  send_interrupt = true
  stop_on_error = false

[log]
  time = true