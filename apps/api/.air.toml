root = "."
tmp_dir = "apps/api/tmp"

[build]
  cmd = "go build -o ./apps/api/tmp/main ./apps/api"
  bin = "./apps/api/tmp/main"
  include_dir = ["apps/api", "pkg"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  kill_delay = "500ms"
  send_interrupt = true
  stop_on_error = false

[log]
  time = true
