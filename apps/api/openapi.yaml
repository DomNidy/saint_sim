# https://swagger.io/specification/
openapi: 3.0.3
info:
  title: Saint API
  version: 1.0.0
  description: |-
    This API responsible for the saint business logic. The discord bot, and, potentially more services in the future, will call this API.

paths:
  /simulation/{id}:
    get:
      operationId: getSimulation
      description: View the result of a simulation.
      parameters:
        - name: id
          in: path
          description: The ID of the simulation to query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The simulation result, or, if the simulation is currently in progress, the current state of the simulation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simulation"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simulation:
    post:
      operationId: simulate
      description: Request a simulation, powered by SimC.
      requestBody:
        required: true
        description: "Specify simulation options here."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/simulation_options"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "202":
          description: Simulation request was accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                    description: ID of the simulation that was created
        "400":
          description: Returned when the request is malformed or contains invalid simulation options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "401":
          description: Returned when the request does not include valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simc/gear-preview:
    post:
      operationId: simcGearPreview
      description: Parse a SimC addon export and return grouped gear preview data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/gear_preview_request"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: Grouped preview data for parsed gear.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/gear_preview_response"
        "400":
          $ref: "#/components/responses/bad_request_error"
        "401":
          description: Returned when the request does not include valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "500":
          $ref: "#/components/responses/internal_error"
components:
  responses:
    bad_request_error:
      description: Returned when the request is malformed or contains invalid input.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    not_found_error:
      description: Returned when the api could not locate a requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    internal_error:
      description: Returned whenever an internal server error occurs. This usually means the cause for the error was out of the control of the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
  securitySchemes:
    BearerAuth:
      description: |
        Better Auth JWT used by first-party callers.
        Use the `Authorization: Bearer <jwt>` header to authenticate.
        Tokens should be issued by `BETTER_AUTH_URL` and intended for `SAINT_API_URL`.
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      description: |
        Schema used by trusted clients that authenticate with our API.
        Use the `Api-Key: <api_key>` header to authenticate.
      type: apiKey
      in: header
      name: Api-Key
  schemas:
    simc_addon_export:
      type: string
      description: Raw SimulationCraft addon export string supplied by the caller.
      example: |
        priest="Example"
        level=80
        spec=shadow
      minLength: 1

    simulation_options:
      type: object
      description: Specifies simulation options to send to the API.
      required:
        - simc_addon_export
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"

    gear_preview_request:
      type: object
      required:
        - simc_addon_export
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"

    gear_preview_item_source:
      type: string
      enum:
        - equipped
        - bag

    gear_preview_item:
      type: object
      required:
        - fingerprint
        - slot
        - name
        - display_name
        - item_id
        - wowhead_url
        - wowhead_data
        - source
        - raw_line
      properties:
        fingerprint:
          type: string
        slot:
          type: string
        name:
          type: string
        display_name:
          type: string
        item_id:
          type: integer
        item_level:
          type: integer
          nullable: true
        icon_url:
          type: string
          nullable: true
        wowhead_url:
          type: string
        wowhead_data:
          type: string
        source:
          $ref: "#/components/schemas/gear_preview_item_source"
        raw_line:
          type: string

    gear_preview_group:
      type: object
      required:
        - slot
        - label
        - items
      properties:
        slot:
          type: string
        label:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/gear_preview_item"

    gear_preview_response:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/gear_preview_group"

    simulation:
      type: object
      description: All details & data about a simulation.
      properties:
        id:
          type: string
          description: ID for the simulation operation
          example: "41e9a22f-d2c1-48b2-b234-15db461049d4"
        simulation_status:
            $ref: "#/components/schemas/simulation_status"
        sim_result:
          type: string
          description: The raw output / result of the simulation operation
          example: "..."
        error_text:
          type: string
          description: Error message for the simulation job (if one occurred)

    simulation_status:
      type: string
      enum:
        - in_progress # currently being performed
        - in_queue # waiting to be picked up and in queue
        - error # failed
        - complete 

    error_response:
      type: object
      description: Error response returned by API when something goes wrong
      properties:
        message:
          type: string
          description: Message explaining the error
