version: "2"
run:
  timeout: 3m
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
  allow-serial-runners: false
  go: "1.17"
formatters:
  enable:
    - golines
    - goimports
    - gofmt
  settings:
    golines:
      chain-split-dots: true
      max-len: 100
      shorten-comments: true
    goimports:
      local-prefixes:
        - github.com/DomNidy/saint_sim
linters:
  default: all
  exclusions:
    # ignore issues on files that are autogenerated
    generated: lax

  disable:
    - wsl # replaced by wsl_v5
    - depguard
