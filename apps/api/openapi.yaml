# https://swagger.io/specification/
openapi: 3.0.3
info:
  title: Saint API
  version: 1.0.0
  description: |-
    This API responsible for the saint business logic. The discord bot, and, potentially more services in the future, will call this API.

paths:
  /health:
    get:
      operationId: health
      description: Returns API health status.
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_response"
  /simulation/{id}:
    get:
      operationId: getSimulation
      description: View the result of a simulation.
      parameters:
        - name: id
          in: path
          description: The ID of the simulation to query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The simulation result, or, if the simulation is currently in progress, the current state of the simulation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simulation"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simulation:
    post:
      operationId: simulate
      description: Request a simulation, powered by SimC.
      requestBody:
        required: true
        description: "Specify simulation options here."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/simulation_options"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "202":
          description: Simulation request was accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                    description: ID of the simulation that was created
        "400":
          description: Returned when the request is malformed or contains invalid simulation options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "401":
          description: Returned when the request does not include valid authentication credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simc/parse-addon-export:
    post:
      operationId: parseAddonExport
      description: Parse a SimC addon export and return structured addon export data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/parse_addon_export_request"
      responses:
        "200":
          description: Structured parsed data for the addon export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/parse_addon_export_response"
        "400":
          $ref: "#/components/responses/bad_request_error"
        "500":
          $ref: "#/components/responses/internal_error"
components:
  responses:
    bad_request_error:
      description: Returned when the request is malformed or contains invalid input.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    not_found_error:
      description: Returned when the api could not locate a requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    internal_error:
      description: Returned whenever an internal server error occurs. This usually means the cause for the error was out of the control of the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
  securitySchemes:
    BearerAuth:
      description: |
        Better Auth JWT used by first-party callers.
        Use the `Authorization: Bearer <jwt>` header to authenticate.
        Tokens should be issued by `BETTER_AUTH_URL` and intended for `SAINT_API_URL`.
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      description: |
        Schema used by trusted clients that authenticate with our API.
        Use the `Api-Key: <api_key>` header to authenticate.
      type: apiKey
      in: header
      name: Api-Key
  schemas:
    health_response:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: healthy

    simc_addon_export:
      type: string
      description: Raw SimulationCraft addon export string supplied by the caller.
      example: |
        priest="Example"
        level=80
        spec=shadow
      minLength: 1

    simulation_options:
      type: object
      description: Specifies simulation options to send to the API.
      required:
        - simc_addon_export
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"

    parse_addon_export_request:
      type: object
      required:
        - simc_addon_export
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"

    addon_export_equipment_source:
      type: string
      enum:
        - equipped
        - bag

    addon_export_alternate_talent_loadout:
      type: object
      description: A saved alternate talent loadout exported by the SimC addon, pairing the loadout label with its raw talents string.
      required:
        - name
        - talents
      properties:
        name:
          type: string
        talents:
          type: string

    addon_export_slot_high_watermark:
      type: object
      description: The character's current and highest unlocked upgrade track item levels for a specific gear slot from Additional Character Info.
      required:
        - current_item_level
        - max_item_level
      properties:
        current_item_level:
          type: integer
        max_item_level:
          type: integer

    addon_export_equipment_item:
      type: object
      required:
        - fingerprint
        - slot
        - name
        - display_name
        - item_id
        - source
        - raw_line
      properties:
        fingerprint:
          type: string
        slot:
          type: string
        name:
          type: string
        display_name:
          type: string
        item_id:
          type: integer
        item_level:
          type: integer
          nullable: true
        enchant_id:
          type: integer
          nullable: true
        crafting_quality:
          type: integer
          nullable: true
        bonus_ids:
          type: array
          items:
            type: integer
        gem_ids:
          type: array
          items:
            type: integer
        crafted_stats:
          type: array
          items:
            type: integer
        source:
          $ref: "#/components/schemas/addon_export_equipment_source"
        raw_line:
          type: string

    addon_export:
      type: object
      properties:
        character_name:
          type: string
          nullable: true
        class:
          type: string
          nullable: true
        level:
          type: string
          nullable: true
        race:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        server:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        professions:
          type: string
          nullable: true
        spec:
          type: string
          nullable: true
        active_talents:
          type: string
          nullable: true
        alternate_talent_loadouts:
          type: array
          items:
            $ref: "#/components/schemas/addon_export_alternate_talent_loadout"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/addon_export_equipment_item"
        checksum:
          type: string
          nullable: true
        header_comment:
          type: string
          nullable: true
        simc_addon_comment:
          type: string
          nullable: true
        wow_build_comment:
          type: string
          nullable: true
        required_simc_comment:
          type: string
          nullable: true
        loot_spec:
          type: string
          nullable: true
        catalyst_currencies:
          type: object
          additionalProperties:
            type: integer
        slot_high_watermarks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/addon_export_slot_high_watermark"
        upgrade_achievements:
          type: array
          items:
            type: integer

    parse_addon_export_response:
      type: object
      required:
        - addon_export
      properties:
        addon_export:
          $ref: "#/components/schemas/addon_export"

    simulation:
      type: object
      description: All details & data about a simulation.
      properties:
        id:
          type: string
          description: ID for the simulation operation
          example: "41e9a22f-d2c1-48b2-b234-15db461049d4"
        simulation_status:
            $ref: "#/components/schemas/simulation_status"
        sim_result:
          type: string
          description: The raw output / result of the simulation operation
          example: "..."
        error_text:
          type: string
          description: Error message for the simulation job (if one occurred)

    simulation_status:
      type: string
      enum:
        - in_progress # currently being performed
        - in_queue # waiting to be picked up and in queue
        - error # failed
        - complete 

    error_response:
      type: object
      description: Error response returned by API when something goes wrong
      properties:
        message:
          type: string
          description: Message explaining the error
