# https://swagger.io/specification/
openapi: 3.0.3
info:
  title: Saint API
  version: 1.0.0
  description: |-
    This API responsible for the saint business logic. The discord bot, and, potentially more services in the future, will call this API.

paths:
  /health:
    get:
      operationId: health
      description: Returns API health status.
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_response"
  /simulation/{id}:
    get:
      operationId: getSimulation
      description: View the result of a simulation.
      parameters:
        - name: id
          in: path
          description: The ID of the simulation to query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The simulation result, or, if the simulation is currently in
            progress, the current state of the simulation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/simulation"
        "404":
          $ref: "#/components/responses/not_found_error"
        "500":
          $ref: "#/components/responses/internal_error"
  /simulation:
    post:
      operationId: simulate
      description: Request a simulation, powered by SimC.
      requestBody:
        required: true
        description: "Specify simulation options here."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/simulation_options"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "202":
          description: Simulation request was accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                    description: ID of the simulation that was created
        "400":
          description: Returned when the request is malformed or contains invalid
            simulation options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "401":
          description: Returned when the request does not include valid authentication
            credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error_response"
        "404":
          $ref: "#/components/responses/not_found_error"
        "422":
          $ref: "#/components/responses/malformed_request"
        "500":
          $ref: "#/components/responses/internal_error"
  /simc/parse-addon-export:
    post:
      operationId: parseAddonExport
      description: Parse a SimC addon export and return structured addon export data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/parse_addon_export_request"
      responses:
        "200":
          description: Structured parsed data for the addon export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/parse_addon_export_response"
        "400":
          $ref: "#/components/responses/bad_request_error"
        "500":
          $ref: "#/components/responses/internal_error"
components:
  responses:
    bad_request_error:
      description: Returned when the request is malformed or contains invalid input.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    not_found_error:
      description: Returned when the api could not locate a requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    internal_error:
      description: Returned whenever an internal server error occurs. This usually
        means the cause for the error was out of the control of the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
    malformed_request:
      description: Error response returned by API when user input failed semantic
      content:
        application/json:
          schema:
            required:
              - message
            properties:
              message:
                type: string
  securitySchemes:
    BearerAuth:
      description: |
        Better Auth JWT used by first-party callers.
        Use the `Authorization: Bearer <jwt>` header to authenticate.
        Tokens should be issued by `BETTER_AUTH_URL` and intended for `SAINT_API_URL`.
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      description: |
        Schema used by trusted clients that authenticate with our API.
        Use the `Api-Key: <api_key>` header to authenticate.
      type: apiKey
      in: header
      name: Api-Key
  schemas:
    health_response:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: healthy

    simc_addon_export:
      type: string
      description: Raw SimulationCraft addon export string supplied by the caller.
      example: |
        priest="Example"
        level=80
        spec=shadow
      minLength: 1

    character_class:
      type: string
      enum:
        - warrior
        - hunter
        - monk
        - paladin
        - rogue
        - shaman
        - mage
        - warlock
        - druid
        - deathknight
        - priest
        - demonhunter
        - evoker

    simulation_options:
      type: object
      properties:
        kind:
          description: The kind of simulation to perform. `topGear` simulates all
            combinations of the specified gear, basic simulates the character
            using its equipped gear.
          type: string
          enum:
            - topGear
            - basic
      discriminator:
        propertyName: kind
        mapping:
          basic: "#/components/schemas/simulation_options_basic"
          topGear: "#/components/schemas/simulation_options_topGear"
      oneOf:
        - $ref: "#/components/schemas/simulation_options_basic"
        - $ref: "#/components/schemas/simulation_options_topGear"
      description: Specifies simulation options to send to the API.
      required:
        - kind

    simulation_options_basic:
      type: object
      description: Specifies simulation options to send to the API.
      required:
        - simc_addon_export
        - kind
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"
        kind:
          type: string
          enum:
            - basic

    simulation_options_topGear:
      type: object
      description: Top gear simulation options. The gear which we should try to find
        some optimal combination of.
      required:
        - character_name
        - equipment
        - talent_loadout
        - class
        - spec
        - role
        - kind
      properties:
        character_name:
          type: string
        class:
          description: The class the character is
          $ref: "#/components/schemas/character_class"
        spec:
          description: The spec of the character
          type: string
        role:
          description: The role of the character
        talent_loadout:
          description: The talent loadout to use in the simulation.
          $ref: "#/components/schemas/addon_export_talent_loadout"
        equipment:
          description: The gear to consider in the simulation. We will try to find optimal
            combinations of these. Must have at least 1 item per slot so it is
            possible to form a full equipment set.
          type: array
          items:
            $ref: "#/components/schemas/equipment_item"
        kind:
          type: string
          enum:
            - topGear

    parse_addon_export_request:
      type: object
      required:
        - simc_addon_export
      properties:
        simc_addon_export:
          $ref: "#/components/schemas/simc_addon_export"

    addon_export_equipment_source:
      type: string
      enum:
        - equipped
        - bag

    equipment_slot:
      type: string
      enum:
        - head
        - neck
        - shoulder
        - back
        - chest
        - wrist
        - hands
        - waist
        - legs
        - feet
        - finger1
        - finger2
        - trinket1
        - trinket2
        - main_hand
        - off_hand
        - shirt
        - tabard

    addon_export_talent_loadout:
      type: object
      description: A saved talent loadout exported by the SimC addon, pairing the
        loadout label with its raw talents string.
      required:
        - talents
      properties:
        name:
          description: The name of the talent loadout.
          type: string
        talents:
          description: The WoW talent string
          type: string

    addon_export_slot_high_watermark:
      type: object
      description: The character's current and highest unlocked upgrade track item
        levels for a specific gear slot from Additional Character Info.
      required:
        - current_item_level
        - max_item_level
      properties:
        current_item_level:
          type: integer
        max_item_level:
          type: integer

    equipment_item:
      type: object
      required:
        - slot
        - name
        - display_name
        - item_id
        - source
        - raw_line
      properties:
        slot:
          $ref: "#/components/schemas/equipment_slot"
        name:
          type: string
        display_name:
          type: string
        item_id:
          type: integer
        item_level:
          type: integer
          nullable: true
        enchant_id:
          type: integer
          nullable: true
        crafting_quality:
          type: integer
          nullable: true
        bonus_ids:
          type: array
          items:
            type: integer
        gem_ids:
          type: array
          items:
            type: integer
        crafted_stats:
          type: array
          items:
            type: integer
        source:
          $ref: "#/components/schemas/addon_export_equipment_source"
        raw_line:
          type: string

    addon_export:
      type: object
      properties:
        character_name:
          type: string
          nullable: true
        class:
          $ref: "#/components/schemas/character_class"
          nullable: true
        level:
          type: string
          nullable: true
        race:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        server:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        professions:
          type: string
          nullable: true
        spec:
          type: string
          nullable: true
        talent_loadouts:
          type: array
          items:
            $ref: "#/components/schemas/addon_export_talent_loadout"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/equipment_item"
        checksum:
          type: string
          nullable: true
        header_comment:
          type: string
          nullable: true
        simc_addon_comment:
          type: string
          nullable: true
        wow_build_comment:
          type: string
          nullable: true
        required_simc_comment:
          type: string
          nullable: true
        loot_spec:
          type: string
          nullable: true
        catalyst_currencies:
          type: object
          additionalProperties:
            type: integer
        slot_high_watermarks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/addon_export_slot_high_watermark"
        upgrade_achievements:
          type: array
          items:
            type: integer

    parse_addon_export_response:
      type: object
      required:
        - addon_export
      properties:
        addon_export:
          $ref: "#/components/schemas/addon_export"

    simulation:
      type: object
      description: Polling envelope for a simulation job.
      required:
        - id
        - kind
        - status
      properties:
        id:
          type: string
          format: uuid
          description: ID for the simulation operation.
          example: "41e9a22f-d2c1-48b2-b234-15db461049d4"
        kind:
          description: >
            Which simulation variant this job is. Determines the concrete shape
            of `result` once the job completes. Mirrors the `kind` submitted in
            simulation_options.
          type: string
          enum:
            - basic
            - topGear
        status:
          $ref: "#/components/schemas/simulation_status"
        error_text:
          type: string
          description: Populated when status = error.
        result:
          description: >
            Present only when status = complete. The concrete variant is
            selected by `kind` on this envelope (and repeated inside the result
            object as the union discriminator).
          $ref: "#/components/schemas/simulation_result"

    simulation_result:
      description: >
        Typed output of a completed simulation. This is the value the worker
        writes to `simulation.sim_result` in the database and the API returns
        verbatim; the API does not recompute it on read.
      oneOf:
        - $ref: "#/components/schemas/simulation_result_basic"
        - $ref: "#/components/schemas/simulation_result_top_gear"
      discriminator:
        propertyName: kind
        mapping:
          basic: "#/components/schemas/simulation_result_basic"
          topGear: "#/components/schemas/simulation_result_top_gear"

    simulation_result_basic:
      type: object
      description: >
        Result of a `basic` simulation — a single actor simmed with their
        equipped gear. For now this just surfaces the headline DPS and the raw
        simc log; it will grow structured stats later.
      required:
        - kind
        - dps
      properties:
        kind:
          type: string
          enum: [ basic ]
        dps:
          type: number
          format: double
          description: Mean DPS of the simmed actor.
        raw_log:
          type: string
          description: >
            Human-readable stdout from simc. Optional; may be truncated or
            omitted for large runs.

    simulation_result_top_gear:
      type: object
      description: >
        Result of a `topGear` simulation.

        To keep payload size bounded when many profilesets are generated, items
        are sent once in `equipment` and each profileset references them by
        index. A profileset's `head: 3` means "the item at equipment[3]".
        Indices are stable for the lifetime of this result object; they are NOT
        indices into the request's equipment array (the worker may have
        reordered/deduplicated).
      required:
        - kind
        - metric
        - equipment
        - profilesets
      properties:
        kind:
          type: string
          enum: [ topGear ]
        metric:
          type: string
          description: >
            The statistic `mean` on each profileset refers to. Copied from
            simc's `sim.profilesets.metric` — usually "dps".
          example: dps
        equipment:
          type: array
          description: >
            Item table for this result. Every integer slot value inside
            `profilesets[*].items` is an index into this array.
          items:
            $ref: "#/components/schemas/equipment_item"
        profilesets:
          type: array
          description: >
            All simmed loadouts, sorted by `mean` descending (best first).
          items:
            $ref: "#/components/schemas/top_gear_profileset_result"

    top_gear_profileset_result:
      type: object
      description: One simmed loadout and its headline metric.
      required:
        - name
        - mean
        - items
      properties:
        name:
          type: string
          description: >
            Profileset label as generated by the worker (e.g. "Combo7"). Matches
            `sim.profilesets.results[].name` in the raw simc json2 blob, which
            is how the worker joins metrics to loadouts.
        mean:
          type: number
          format: double
          description: Mean of `metric` (typically DPS) for this loadout.
        mean_error:
          type: number
          format: double
          description: simc's reported error bound on `mean`.
        items:
          $ref: "#/components/schemas/top_gear_profileset_items"

    top_gear_profileset_items:
      type: object
      description: >
        Per-slot equipment selection for a single loadout. Every value is an
        index into the parent result's `equipment` array. `off_hand` is omitted
        when the loadout uses a two-handed weapon.
      required:
        - head
        - neck
        - shoulder
        - back
        - chest
        - wrist
        - hands
        - waist
        - legs
        - feet
        - finger1
        - finger2
        - trinket1
        - trinket2
        - main_hand
      properties:
        head: { type: integer }
        neck: { type: integer }
        shoulder: { type: integer }
        back: { type: integer }
        chest: { type: integer }
        wrist: { type: integer }
        hands: { type: integer }
        waist: { type: integer }
        legs: { type: integer }
        feet: { type: integer }
        finger1: { type: integer }
        finger2: { type: integer }
        trinket1: { type: integer }
        trinket2: { type: integer }
        main_hand: { type: integer }
        off_hand:
          type: integer
          description: Absent when this loadout has no off-hand (two-hander).

    simulation_status:
      type: string
      enum:
        - in_progress # currently being performed
        - in_queue # waiting to be picked up and in queue
        - error # failed
        - complete

    error_response:
      type: object
      description: Error response returned by API when something goes wrong
      properties:
        message:
          type: string
          description: Message explaining the error
